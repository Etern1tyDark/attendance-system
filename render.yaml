services:
  - type: web
    name: smart-attendance-system-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: BCRYPT_SALT_ROUNDS
        value: 10
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_NAME
        value: System Administrator
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
